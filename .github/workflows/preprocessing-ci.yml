name: MLflow CI Retraining

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install mlflow==2.19.0 scikit-learn pandas numpy

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --experiment-name "Telco Churn Prediction - CI" --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          python -c "
          import mlflow
          runs = mlflow.search_runs(experiment_names=['Telco Churn Prediction - CI'], order_by=['start_time DESC'], max_results=1)
          run_id = runs.iloc[0]['run_id']
          print('Latest run ID:', run_id)
          with open('run_id.txt', 'w') as f:
              f.write(run_id)
          "

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Build Docker Model
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          mlflow models build-docker --model-uri "runs:/${RUN_ID}/model" --name telco-churn-model --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag telco-churn-model ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest