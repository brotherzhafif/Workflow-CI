name: MLflow CI Retraining

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --experiment-name "Telco Churn Prediction - CI" --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          python -c "
          import mlflow
          runs = mlflow.search_runs(experiment_names=['Telco Churn Prediction - CI'], order_by=['start_time DESC'], max_results=1)
          print('Latest run ID:', runs.iloc[0]['run_id'])
          "

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/